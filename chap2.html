<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Fantasia TWV40.08 - G.P Telemann, mm 89-95</title>
  <link rel="stylesheet" href="css/audios.css">
</head>
<body>

   <header>
    <h1>Fantasia TWV40.08 - Georg Philipp Telemann</h1>
    <p>Performances comparison, mm 89-95</p>
  </header>

 <main class="player-grid">

    <section class="controls">
      <h2>Choose a performance
      </h2>

      <button onclick="playVideo(1)" class="play">
        <span class="artist">Jean-Pierre Rampal</span>
        <span class="meta">modern Flute</span>
      </button>

      <button onclick="playVideo(2)" class="play">
        <span class="artist">François Leleux</span>
        <span class="meta">Oboe</span>
      </button>
    </section>

    <section class="viewer">
      <div id="player1" class="video hidden"></div>
      <div id="player2" class="video hidden"></div>
    </section>

  </main>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  let player1, player2;
  const videos = [
    {id: '3-H0vnusYng', start: 149, end: 165},  // Rampal
    {id: '0ctlujDyd1o', start: 184, end: 209}   // Leleux
  ];

  function onYouTubeIframeAPIReady() {
    player1 = new YT.Player('player1', { height: '315', width: '400', videoId: '', playerVars: { autoplay: 0, controls: 1 } });
    player2 = new YT.Player('player2', { height: '315', width: '400', videoId: '', playerVars: { autoplay: 0, controls: 1 } });
  }

  function playVideo(num) {
  let player = num === 1 ? player1 : player2;
  let video = videos[num - 1];
  let div = document.getElementById(`player${num}`);

  if (player && player.loadVideoById) {
    player.loadVideoById({
      videoId: video.id,
      startSeconds: video.start,
      endSeconds: video.end
    });

    div.classList.remove("hidden");
    div.classList.add("active");
  }
}
</script>

</body>
</html>
